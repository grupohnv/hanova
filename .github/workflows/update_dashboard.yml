name: Atualizar Dashboard Hanova

on:
  schedule:
    - cron: '0 9,12,15,18 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Install Node deps
        run: npm install xlsx

      - name: Download files from Drive
        run: node scripts/download_drive.js

      - name: Process entrada files
        run: node scripts/processar_entrada_cloud.js

      - name: Convert XLSX
        run: node scripts/convert_xlsx_cloud.js

      - name: Update HTML
        run: node scripts/update_data_cloud.js

      - name: Upload updated files to Drive
        run: node scripts/upload_drive.js

      - name: Commit and push dashboard
        run: |
          git config user.name "hanova-bot"
          git config user.email "bot@hanova.com"
          git add dashboard_hanova.html
          git diff --staged --quiet && echo "Sem mudancas" || git commit -m "Auto update"
          git push
